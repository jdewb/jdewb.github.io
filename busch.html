<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Playlist Loop Player</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .player-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .note {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 12px;
      border-radius: 8px;
      line-height: 1.4;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="player-wrap">
    <iframe
      src="https://www.youtube.com/embed/videoseries?list=PLcu3Saz8YFvOpzk9TzLEjC2J7Oz3zWp_S&autoplay=1&loop=1&playlist=PLcu3Saz8YFvOpzk9TzLEjC2J7Oz3zWp_S&controls=0&rel=0&modestbranding=1&iv_load_policy=3&enablejsapi=1"
      title="YouTube playlist player"
      allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
      allowfullscreen>
    </iframe>

    <div class="note">
      Browser autoplay rules may require the video to start muted first<!--, or require one click before playback begins.-->
    </div>
  </div>
</body>
</html>
