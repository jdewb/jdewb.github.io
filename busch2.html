<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Playlist Loop Player</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #player {
      width: 100vw;
      height: 100vh;
    }

    .note {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 12px;
      border-radius: 8px;
      line-height: 1.4;
      max-width: 340px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="player"></div>

  <div class="note">
    Browser autoplay rules may still require one click before playback begins.
  </div>

  <script>
    const PLAYLIST_ID = "PLcu3Saz8YFvOpzk9TzLEjC2J7Oz3zWp_S";
    const END_BUFFER_SECONDS = 10.25; // skip a little before the end screen
    let player;
    let endCheckInterval = null;
    let isSkipping = false;

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        playerVars: {
          listType: "playlist",
          list: PLAYLIST_ID,
          autoplay: 1,
          loop: 1,
          controls: 1,
          rel: 0,
          playsinline: 1,
          enablejsapi: 1,
          origin: window.location.origin
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: onPlayerError
        }
      });
    }

    function onPlayerReady(event) {
      try {
        event.target.playVideo();
      } catch (e) {}
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        startEndMonitor();
      } else {
        stopEndMonitor();
      }

      // fallback, in case we still somehow hit the true end
      if (event.data === YT.PlayerState.ENDED) {
        skipToNextVideo();
      }
    }

    function startEndMonitor() {
      stopEndMonitor();

      endCheckInterval = setInterval(() => {
        if (!player || typeof player.getDuration !== "function" || typeof player.getCurrentTime !== "function") {
          return;
        }

        const duration = player.getDuration();
        const currentTime = player.getCurrentTime();

        if (!duration || !currentTime || isSkipping) return;

        const remaining = duration - currentTime;

        if (remaining <= END_BUFFER_SECONDS) {
          skipToNextVideo();
        }
      }, 200);
    }

    function stopEndMonitor() {
      if (endCheckInterval) {
        clearInterval(endCheckInterval);
        endCheckInterval = null;
      }
    }

    function skipToNextVideo() {
      if (isSkipping) return;
      isSkipping = true;

      try {
        player.nextVideo();
      } catch (e) {
        try {
          player.loadPlaylist({
            list: PLAYLIST_ID,
            listType: "playlist",
            index: 0,
            startSeconds: 0
          });
        } catch (err) {}
      }

      setTimeout(() => {
        isSkipping = false;
      }, 1000);
    }

    function onPlayerError() {
      // if a video errors, keep the playlist moving
      skipToNextVideo();
    }
  </script>
</body>
</html>
